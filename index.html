<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>São João Cia do Chopp 2026</title>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="background:red;color:white;padding:20px;position:fixed;top:0;left:0;right:0;z-index:9999;"><strong>Critical Error:</strong> ' + event.message + '<br/><pre>' + (event.error && event.error.stack ? event.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="background:red;color:white;padding:20px;position:fixed;bottom:0;left:0;right:0;z-index:9999;"><strong>Unhandled Promise Rejection:</strong> ' + event.reason + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
